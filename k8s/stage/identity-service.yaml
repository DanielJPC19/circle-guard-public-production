apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-service
  namespace: circleguard-stage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: identity-service
  template:
    metadata:
      labels:
        app: identity-service
    spec:
      containers:
        - name: identity-service
          image: danieljpc1119/circleguard-identity-service:staging
          ports:
            - containerPort: 8083
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: identity-db-url
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: db-username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: db-password
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: circleguard-kafka:9092
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: jwt-secret
            - name: VAULT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: vault-secret
            - name: VAULT_SALT
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: vault-salt
            - name: VAULT_HASH_SALT
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: vault-hash-salt
            - name: SPRING_FLYWAY_TABLE
              value: "flyway_identity"
            - name: SPRING_FLYWAY_VALIDATE_ON_MIGRATE
              value: "false"
---
apiVersion: v1
kind: Service
metadata:
  name: identity-service
  namespace: circleguard-stage
spec:
  selector:
    app: identity-service
  ports:
    - port: 8083
      targetPort: 8083
  type: ClusterIP

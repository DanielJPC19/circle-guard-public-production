apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: circleguard-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: danieljpc1119/circleguard-auth-service:latest
          ports:
            - containerPort: 8180
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: auth-db-url
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: db-username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: db-password
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: circleguard-kafka:9092
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: jwt-secret
            - name: SPRING_LDAP_URLS
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: ldap-url
            - name: SPRING_LDAP_BASE
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: ldap-base-dn
            - name: SPRING_LDAP_USERNAME
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: ldap-manager-dn
            - name: SPRING_LDAP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: ldap-manager-password
            - name: QR_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: qr-secret
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: circleguard-prod
spec:
  selector:
    app: auth-service
  ports:
    - port: 8180
      targetPort: 8180
  type: ClusterIP

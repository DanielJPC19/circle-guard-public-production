apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: circleguard-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: danieljpc1119/circleguard-auth-service:latest
          ports:
            - containerPort: 8180
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://circleguard-postgres:5432/circleguard_auth
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: circleguard-config
                  key: POSTGRES_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: circleguard-secret
                  key: POSTGRES_PASSWORD
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: circleguard-kafka:9092
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: circleguard-secret
                  key: JWT_SECRET
            - name: QR_SECRET
              valueFrom:
                secretKeyRef:
                  name: circleguard-secret
                  key: QR_SECRET
            - name: SPRING_LDAP_URLS
              valueFrom:
                secretKeyRef:
                  name: circleguard-secret
                  key: LDAP_URL
            - name: SPRING_LDAP_BASE
              valueFrom:
                secretKeyRef:
                  name: circleguard-secret
                  key: LDAP_BASE_DN
            - name: SPRING_LDAP_USERNAME
              valueFrom:
                secretKeyRef:
                  name: circleguard-secret
                  key: LDAP_MANAGER_DN
            - name: SPRING_LDAP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: circleguard-secret
                  key: LDAP_MANAGER_PASSWORD
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: circleguard-prod
spec:
  selector:
    app: auth-service
  ports:
    - port: 8180
      targetPort: 8180
  type: ClusterIP

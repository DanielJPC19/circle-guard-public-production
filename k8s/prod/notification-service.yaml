apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: circleguard-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: danieljpc1119/circleguard-notification-service:latest
          ports:
            - containerPort: 8082
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          env:
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: kafka:9092
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: circleguard-secret
                  key: JWT_SECRET
            - name: AUTH_API_URL
              value: "http://auth-service:8180"
            - name: SPRING_MAIL_HOST
              value: "localhost"
            - name: SPRING_MAIL_PORT
              value: "25"
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: circleguard-prod
spec:
  selector:
    app: notification-service
  ports:
    - port: 8082
      targetPort: 8082
  type: ClusterIP

apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: circleguard-prod
spec:
  replicas: 3
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: danieljpc1119/circleguard-notification-service:latest
          ports:
            - containerPort: 8082
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          env:
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: circleguard-kafka:9092
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: jwt-secret
            - name: AUTH_API_URL
              value: "http://auth-service:8180"
            - name: SPRING_AUTOCONFIGURE_EXCLUDE
              value: "org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 60
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: circleguard-prod
spec:
  selector:
    app: notification-service
  ports:
    - port: 8082
      targetPort: 8082
  type: ClusterIP
